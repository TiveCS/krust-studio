name: Release

# Build production installers for all platforms.
# - push a tag like `v1.0.0`  -> builds + attaches installers to a GitHub Release
# - manual run (workflow_dispatch) -> builds + uploads installers as run artifacts
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build: pnpm run build:win
          - os: macos-latest
            build: pnpm run build:mac
          - os: ubuntu-latest
            # snap needs snapcraft/lxd (flaky in CI) -> AppImage + deb only
            build: pnpm exec electron-vite build && pnpm exec electron-builder --linux AppImage deb
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: krust-studio-app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: krust-studio-app/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: ${{ matrix.build }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # If Apple signing secrets are present, electron-builder can use them.
          # Otherwise the macOS package is ad-hoc signed so it can still run
          # after a manual Gatekeeper bypass.
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify macOS code signatures
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          app_path="$(find dist -maxdepth 3 -type d -name 'Krust Studio.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "::error::Krust Studio.app was not produced"
            exit 1
          fi

          framework_path="$app_path/Contents/Frameworks/Electron Framework.framework/Versions/A/Electron Framework"
          if [ ! -f "$framework_path" ]; then
            echo "::error::Electron Framework was not bundled at $framework_path"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"

          app_team_id="$(codesign -dv --verbose=4 "$app_path" 2>&1 | sed -n 's/^TeamIdentifier=//p')"
          framework_team_id="$(codesign -dv --verbose=4 "$framework_path" 2>&1 | sed -n 's/^TeamIdentifier=//p')"

          echo "App Team ID: ${app_team_id:-<empty>}"
          echo "Electron Framework Team ID: ${framework_team_id:-<empty>}"

          if [ "$app_team_id" != "$framework_team_id" ]; then
            echo "::error::macOS app and Electron Framework have different Team IDs"
            exit 1
          fi

      # NOTE: on a tag, electron-builder itself publishes ALL artifacts —
      # installers, update manifests (latest*.yml) and .blockmap files — to a
      # DRAFT GitHub Release (see electron-builder.yml `publish.releaseType:
      # draft`). Do NOT add a second publisher (e.g. softprops/action-gh-release)
      # here: it races electron-builder across the parallel OS jobs and can
      # force-publish the release before the Windows `latest.yml` lands, which
      # breaks auto-update (the v1.3.4 incident). Review the draft and publish it
      # manually.
      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            krust-studio-app/dist/*.exe
            krust-studio-app/dist/*.dmg
            krust-studio-app/dist/*.zip
            krust-studio-app/dist/*.AppImage
            krust-studio-app/dist/*.deb
            krust-studio-app/dist/*.yml
            krust-studio-app/dist/*.blockmap
