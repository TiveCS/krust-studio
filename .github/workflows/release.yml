name: Release

# Build production installers for all platforms.
# - push a tag like `v1.0.0`  -> builds + attaches installers to a GitHub Release
# - manual run (workflow_dispatch) -> builds + uploads installers as run artifacts
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build: pnpm run build:win
          - os: macos-latest
            build: pnpm run build:mac
          - os: ubuntu-latest
            # snap needs snapcraft/lxd (flaky in CI) -> AppImage + deb only
            build: pnpm exec electron-vite build && pnpm exec electron-builder --linux AppImage deb
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: krust-studio-app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: krust-studio-app/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: ${{ matrix.build }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # no signing certs in CI -> don't try to sign/notarize
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # NOTE: on a tag, electron-builder itself publishes ALL artifacts —
      # installers, update manifests (latest*.yml) and .blockmap files — to a
      # DRAFT GitHub Release (see electron-builder.yml `publish.releaseType:
      # draft`). Do NOT add a second publisher (e.g. softprops/action-gh-release)
      # here: it races electron-builder across the parallel OS jobs and can
      # force-publish the release before the Windows `latest.yml` lands, which
      # breaks auto-update (the v1.3.4 incident). Review the draft and publish it
      # manually.
      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            krust-studio-app/dist/*.exe
            krust-studio-app/dist/*.dmg
            krust-studio-app/dist/*.zip
            krust-studio-app/dist/*.AppImage
            krust-studio-app/dist/*.deb
            krust-studio-app/dist/*.yml
            krust-studio-app/dist/*.blockmap
